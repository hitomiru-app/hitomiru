// 過去7日分の日付配列
// ストリーク計算：今日を含む連続達成日数
function calcStreak(tasks) {
  let streak = 0;
  let skip = 0; // タスクなし日のスキップ上限
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const dayT = tasks.filter(t => t.date === dateStr && !t.isRepeat);
    if (!dayT.length) {
      // タスクなしの日は最初の2日だけスキップ（まだ使い始め等を考慮）
      if (streak === 0 && skip < 2) { skip++; d.setDate(d.getDate()-1); continue; }
      else break;
    }
    const done = dayT.filter(t => t.done).length;
    if (done / dayT.length >= 0.5) {
      streak++;
      d.setDate(d.getDate()-1);
    } else {
      // 今日だけはまだ達成中の可能性があるのでスキップ
      if (i === 0) { d.setDate(d.getDate()-1); continue; }
      break;
    }
  }
  return streak;
}

// 翌日リセット：今日以外の過去タスクをアーカイブ（done=trueのまま保持、表示しないだけ）
// → 実際はfilterで今日分だけ表示しているので自動でリセット済み
// ただし「完了済みの今日タスク」は当日中は表示、翌日は自然に消える

function last7Days() {
  return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;});
}

function nearestNextHalfHour(){const d=new Date();return d.getMinutes()<30?String(d.getHours()).padStart(2,"0")+":30":String((d.getHours()+1)%24).padStart(2,"0")+":00";}
function timeOptions(selectedVal,includeNone=true){
  const auto=(selectedVal===null||selectedVal===undefined)?nearestNextHalfHour():selectedVal;
  let opts=includeNone?`<option value=""${auto===""?" selected":""}>--</option>`:"";
  for(let h=0;h<24;h++){for(let m of[0,30]){const val=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");opts+=`<option value="${val}"${auto===val?" selected":""}>${val}</option>`;}}
  return opts;
}

// URLパラメータからトークンを取得（?client=abc123xyz）
const urlToken = (()=>{
  const p = new URLSearchParams(location.search);
  return p.get("client") || null;
})();
// トークンからclient_idを解決（loadAll後に設定）
let urlClientId = null;
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function localDate(str){const[y,m,d]=str.split("-").map(Number);return new Date(y,m-1,d);}
function nowHHMM(){const d=new Date();return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtShort(d){return d.slice(5).replace("-","/")}
function fmtNow(){const d=new Date();return `${MON[d.getMonth()].toUpperCase()} ${d.getDate()}, ${d.getFullYear()} (${WD[d.getDay()]})`;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function checkSVG(){return `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function barHTML(pct,color=""){return `<div class="bar"><div class="bar-fill" style="width:${pct}%${color?";background:"+color:""}"></div></div>`;}
function getCat(id){return CATS.find(c=>c.id===id)||CATS[0];}
function getGoal(id){return S.goals.find(g=>g.id===id);}
function isOverdue(t){const dl=t.time;if(t.done||t.date!==today()||!dl)return false;return dl<nowHHMM();}
// 締切日を過ぎた未完了タスク（今日より前の日付）
function isPastDue(t){if(t.done||t.isRepeat)return false;return t.date<today();}
function isStarted(t){if(t.done||t.date!==today()||!t.start_time)return false;const now=nowHHMM();return t.start_time<=now&&(!t.time||now<t.time);}
function fmtTimeRange(t){if(t.start_time&&t.time)return `${t.start_time}→${t.time}`;if(t.start_time)return `${t.start_time}〜`;if(t.time)return `〜${t.time}`;return "";}
function lineURL(msg){return `https://line.me/R/share?text=${encodeURIComponent(msg)}`;}

// Messaging API経由で公式LINEから直接送信
async function sendLineMessage(lineUserId, message) {
  try {
    const res = await fetch(`${SB_URL}/functions/v1/send-line-message`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SB_KEY,
      },
      body: JSON.stringify({ lineUserId, message }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast('送信しました！');
    } else {
      showToast('送信に失敗しました', true);
    }
  } catch(e) {
    showToast('送信に失敗しました', true);
  }
}

function showToast(msg, isError=false) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:${isError?'var(--red)':'var(--green)'};color:#fff;
    padding:12px 24px;border-radius:99px;font-size:13px;font-weight:700;
    z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);
    animation:fadeInUp .3s ease;
  `;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function repeatMatchesToday(r){const dow=new Date().getDay();if(r==="daily")return true;if(r==="weekday")return dow>=1&&dow<=5;if(r==="weekend")return dow===0||dow===6;if(r.startsWith("weekly:"))return +r.split(":")[1]===dow;if(r.startsWith("monthly:"))return +r.split(":")[1]===new Date().getDate();return false;}
function repeatLabel(r){const f=REPEAT_OPTS.find(o=>o.v===r);return f?f.l:r;}

// ── アラート判定 ─────────────────────────────────────────
// クライアントのタスク履歴からアラートを計算
function calcClientAlert(clientTasks) {
  const days = last7Days();
  const rates = days.map(d => {
    const dayTasks = clientTasks.filter(t => t.date === d);
    if (!dayTasks.length) return null;
    const done = dayTasks.filter(t => t.done).length;
    return Math.round(done / dayTasks.length * 100);
  }).filter(r => r !== null);

  if (!rates.length) return "none";

  // 直近3日連続で50%未満 → 赤アラート
  const recent = rates.slice(-3);
  if (recent.length >= 3 && recent.every(r => r < 50)) return "red";

  // 直近5日で平均60%未満 → 黄アラート
  const avg = rates.reduce((a,b) => a+b, 0) / rates.length;
  if (avg < 60) return "yellow";

  return "none";
}

// 週間達成率データ（グラフ用）
function weeklyRates(clientTasks) {
  return last7Days().map(d => {
    const dayT = clientTasks.filter(t => t.date === d);
    if (!dayT.length) return {date:d, pct:null};
    const done = dayT.filter(t => t.done).length;
    return {date:d, pct:Math.round(done/dayT.length*100)};
  });
}

async function loadAll() {
  const [goals,tasks,repeats,repeatDone,clients] = await Promise.all([
    sb("GET","goals","","?order=id"),
    sb("GET","tasks","","?order=id"),
    sb("GET","repeats","","?order=id"),
    sb("GET","repeat_done","","?date=eq."+today()),
    sb("GET","clients","","?order=id"),
  ]);
  S.goals=goals||[]; S.tasks=tasks||[]; S.repeats=repeats||[];
  S.repeatDone=repeatDone||[]; S.clients=clients||[];

  if(urlToken && !isManager) {

  render();
}

async function toggleRepeatDone(rid,date){
  const existing=S.repeatDone.find(d=>d.repeat_id===rid&&d.date===date);
  if(existing){
    await sb("DELETE","repeat_done","",`?repeat_id=eq.${rid}&date=eq.${date}`);
    S.repeatDone=S.repeatDone.filter(d=>!(d.repeat_id===rid&&d.date===date));
  } else {
    const rows=await sb("POST","repeat_done",{repeat_id:rid,date});
    if(rows&&rows[0])S.repeatDone.push(rows[0]);
  }
  render();
}
function generateToken() {
  // 12文字のランダムトークン生成（英数字）
  const chars = "abcdefghijkmnpqrstuvwxyz23456789"; // 紛らわしい文字を除外
  return Array.from({length:12}, ()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

async function addClient(data){
  const token = generateToken();
  const rows=await sb("POST","clients",{name:data.name,color:data.color||"#6C63FF",token});
  if(rows&&rows[0]){
    S.clients.push(rows[0]);
    S.newClientId=rows[0].id;
  }
  S.addingClient=false;
  render();
}
async function deleteClient(id){
  // タスクを先に削除してから、クライアントを削除
  await sb("DELETE","tasks","",`?client_id=eq.${id}`);
  await sb("DELETE","clients","",`?id=eq.${id}`);
  S.tasks=S.tasks.filter(t=>t.client_id!==id);
  S.clients=S.clients.filter(c=>c.id!==id);
  if(S.selClientId===id)S.selClientId=null;
  render();
}

  return S.repeats.filter(r=>repeatMatchesToday(r.repeat)).map(r=>({

    start_time:r.start_time||"",time:r.time||"",date:today(),

    isRepeat:true,repeatStr:r.repeat,client_id:r.client_id||null,
  }));
}
function getAllTasks(){return [...S.tasks,...getTodayRepeats()];}

function countAlerts(){
  return S.clients.filter(c=>{
    const tasks=getClientTasks(c.id);
    return calcClientAlert(tasks)==="red";
  }).length;
}

// ══ 当事者ビュー ══════════════════════════════════════════
function renderUser(){
  // urlClientIdがない（素のURL）場合はアクセス制限
  if(!isManager && urlClientId === null) {
    const side=pcSideNav("today");
    const isPc=window.innerWidth>=768;
    const isInvalidToken = urlToken !== null; // トークンはあるが一致しない
    return (isPc?`<div class="pc-main">`:"") + `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;background:var(--cream)">
        <img src="${ICON_B64}" style="width:80px;height:80px;border-radius:20px;object-fit:cover;margin-bottom:20px">
        <div style="font-size:22px;font-weight:900;color:var(--ink);margin-bottom:8px">ヒトミル</div>
        ${isInvalidToken
          ? `<div style="font-size:14px;color:var(--red);line-height:1.8;margin-bottom:16px">URLが正しくありません。<br>コーチから受け取ったURLを<br>もう一度確認してください。</div>`
          : `<div style="font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:16px">コーチから受け取ったURLで<br>アクセスしてください</div>`
        }
      </div>
    ` + (isPc?`</div>`:"");
  }

  const all = urlClientId !== null
    ? [...S.tasks.filter(t=>t.client_id===urlClientId), ...getTodayRepeats()]
    : getAllTasks();
  const todayT=all.filter(t=>t.date===today());
  const filtered=S.catFilter==="all"?todayT:todayT.filter(t=>t.cat===S.catFilter);
  const streak=calcStreak(urlClientId!==null?S.tasks.filter(t=>t.client_id===urlClientId):S.tasks);
  const done=filtered.filter(t=>t.done).length;
  const total=filtered.length;
  const pct=total?Math.round(done/total*100):0;
  const content=S.tab==="today"?userToday(filtered,all):S.tab==="calendar"?calView(all,false):S.tab==="goals"?userGoals():userRepeats();
  // アバターにクライアント名を反映
  const side=pcSideNav(S.tab);
  const isPc=window.innerWidth>=768;
  const wrap=isPc?`<div class="pc-main">`:"";
  const wrapEnd=isPc?`</div>`:"";
  return side+wrap+`
    <div class="mode-bar user" id="mode-bar-user">当事者</div>
    <div class="hdr">
      <div class="hdr-row">
        <div>
          <div class="hdr-eyebrow">${fmtNow()}</div>
          <div class="hdr-title">${pct===100?"完璧":`${pct}%`}</div>
          <div class="hdr-sub">${done} / ${total} 完了${streak>=7?`  ·  <span style="color:var(--y);font-weight:700">${streak}日連続</span>`:streak>0?`  ·  <span style="color:var(--yd);font-weight:700">${streak}日連続</span>`:""}</div>
        </div>
        <div class="av" id="user-av">あ</div>
      </div>
      ${barHTML(pct)}
      <div class="tabs">
        <button class="tab-btn${S.tab==="today"?"    active":""}" data-tab="today">今日</button>
        <button class="tab-btn${S.tab==="calendar"?" active":""}" data-tab="calendar">カレンダー</button>
        <button class="tab-btn${S.tab==="goals"?"    active":""}" data-tab="goals">目標</button>
        <button class="tab-btn${S.tab==="repeats"?"  active":""}" data-tab="repeats">固定</button>
      </div>
    </div>
    <div class="scroll">${content}</div>
    ${S.tab==="today"?renderAddArea():""}
    ${editFormHTML()}
  `+wrapEnd;
}

// ── ダッシュボード ──────────────────────────────────────

function renderRowUser(t){
  const g=getGoal(t.goal_id),od=isOverdue(t),st=isStarted(t);
  const timeStr=fmtTimeRange(t);
  const meta=[g?g.title:"",timeStr].filter(Boolean).join("  ·  ");
  const editBtns=!t.isRepeat?`
    <button class="task-edit-btn" data-edit="${t.id}">編集</button>
    <button class="task-del-btn" data-del="${t.id}">×</button>`:"";
  return `<div class="task-row${t.done?" done":""}">
    <div class="chk${t.done?" checked":""}" data-chk="${t.id}">${t.done?checkSVG():""}</div>
    <div style="flex:1;min-width:0">

function userToday(filtered, allTasks=[]){
  const doneCount = filtered.filter(t=>t.done).length;
  const toggleDoneBtn = doneCount > 0 ? `<button class="tog-btn" id="user-toggle-done" style="margin-left:auto">${S.showUserDone ? `完了済みを隠す (${doneCount}件)` : `完了済みを表示 (${doneCount}件)`}</button>` : "";
  const pills=[`<button class="pill${S.catFilter==="all"?" active":""}" data-cat="all">すべて</button>`,
    ...CATS.map(c=>`<button class="pill${S.catFilter===c.id?" active":""}" data-cat="${c.id}">${c.label}</button>`)].join("");
  const undone=filtered.filter(t=>!t.done),done=filtered.filter(t=>t.done);
  const undoneRows=undone.map(renderRowUser).join("");
  const doneRows=done.length===0?"":S.showDone?`<div style="height:1px;background:var(--line);margin:8px 0"></div>`+done.map(renderRowUser).join(""):"";
  const togBtn=done.length>0?`<button class="tog-btn" id="toggle-done">${S.showDone?`完了済みを隠す (${done.length}件)`:`完了済みを表示 (${done.length}件)`}</button>`:"";
  const rows=(undone.length===0&&done.length===0)?`<div class="empty">タスクなし</div>`:undoneRows+doneRows+togBtn;

  // やり残しセクション（今日とは完全に分離）
  // urlClientIdがある場合は必ずそのclient_idのタスクだけ表示
  const innerTasks2 = urlClientId!==null
    ? S.tasks.filter(t=>t.client_id===urlClientId)
    : S.tasks.filter(t=>t.client_id===null); // client未指定の場合はnullのみ
  const pastDueTasks = innerTasks2.filter(t=>isPastDue(t));
  const pastDueSection = pastDueTasks.length===0 ? "" : `
    <div class="pastdue-section" id="pastdue-wrap">
      <div class="pastdue-header" id="pastdue-toggle">
        <div class="pastdue-title">
          やり残し
          <span class="pastdue-count">${pastDueTasks.length}</span>
        </div>
        <div class="pastdue-arrow${S.showPastDue?" open":""}">▼</div>
      </div>
      ${S.showPastDue ? `<div class="pastdue-body">
        ${pastDueTasks.map(t=>{
          const g=getGoal(t.goal_id);
          const daysOver=Math.floor((new Date(today())-new Date(t.date))/(1000*60*60*24));
          return `<div class="pastdue-row">
            <div class="chk${t.done?" checked":""}" data-chk="${t.id}" style="flex-shrink:0">${t.done?checkSVG():""}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:500;color:var(--ink)">${esc(t.title)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">${g?g.title+`  ·  `:""}${fmtShort(t.date)}</div>
            </div>
            <span class="pastdue-date">${daysOver}日超過</span>
          </div>`;
        }).join("")}
      </div>` : ""}
    </div>`;

  // 目標グループ表示
  const visibleFiltered = S.showUserDone ? filtered : filtered.filter(t => !t.done);
  const goalGroups = (() => {
    // 目標に紐づくタスク
    const grouped = S.goals.map(g => {
      const gTasks = visibleFiltered.filter(t => t.goal_id === g.id);
      if (!gTasks.length) return "";
      const done = gTasks.filter(t=>t.done).length;
      const pct = Math.round(done/gTasks.length*100);
      const col = pct>=70?"var(--green)":pct>=40?"var(--y)":"var(--red)";
      const taskRows = gTasks.map(t => renderRowUser(t)).join("");
      return `<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:2px solid ${col};margin-bottom:8px">
          <span style="font-size:13px;font-weight:700;color:var(--ink);flex:1">${esc(g.title)}</span>
          <span style="font-size:12px;font-weight:700;color:${col}">${pct}%</span>
          <span style="font-size:11px;color:var(--muted)">${done}/${gTasks.length}</span>
        </div>
        ${taskRows}
      </div>`;
    }).filter(Boolean).join("");

    // 目標なしのタスク
    const noGoalTasks = visibleFiltered.filter(t => !t.goal_id);
    const noGoalRows = noGoalTasks.length ? `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:2px solid #EEE;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700;color:var(--muted);flex:1">目標なし</span>
      </div>
      ${noGoalTasks.map(t => renderRowUser(t)).join("")}
    </div>` : "";

    return grouped + noGoalRows;
  })();

  return `<div class="filters" style="display:flex;align-items:center">${pills}${toggleDoneBtn}</div>${goalGroups}${pastDueSection}`;
}

    <button id="mgr-reload" style="position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:99px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:10">更新</button>`;

function renderClientDetail(){
  const c=S.clients.find(c=>c.id===S.selClientId);
  if(!c)return renderDashboard();
  const tasks=getClientTasks(c.id);
  const todayT=tasks.filter(t=>t.date===today());
  const done=todayT.filter(t=>t.done).length;
  const total=todayT.length;
  const pct=total?Math.round(done/total*100):0;
  const overdue=todayT.filter(t=>isOverdue(t)).length;
  const started=todayT.filter(t=>isStarted(t)).length;
  const alert=calcClientAlert(tasks);
  const colorStr=c.color||"#6C63FF";
  const rates=weeklyRates(tasks);

  // 週間グラフ
  const chart=`<div style="margin:14px 0 4px">
    <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">週間達成率</div>
    <div class="week-chart" style="height:70px">
      ${rates.map(r=>{
        const h=r.pct===null?0:r.pct*0.65;
        const col=r.pct===null?"#F0F0F0":r.pct>=70?`var(--green)`:r.pct>=40?`var(--y)`:`var(--red)`;
        return `<div class="week-bar-wrap">
          <div class="week-pct-lbl">${r.pct!==null?r.pct+"%":""}</div>
          <div class="week-bar" style="height:${h}px;background:${col}"></div>
          <div class="week-day-lbl">${WD[localDate(r.date).getDay()]}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;

  // タスク並べ替え
  const sorted=[...todayT].sort((a,b)=>{
    const rank=t=>t.done?3:isOverdue(t)?0:isStarted(t)?1:2;
    if(rank(a)===rank(b)){const ta=a.start_time||a.time||"99:99",tb=b.start_time||b.time||"99:99";return ta.localeCompare(tb);}
    return rank(a)-rank(b);
  });
  const overdueTasks=sorted.filter(t=>isOverdue(t));
  const startedTasks=sorted.filter(t=>isStarted(t));
  const pendingTasks=sorted.filter(t=>!t.done&&!isOverdue(t)&&!isStarted(t));
  const doneTasks=sorted.filter(t=>t.done);
  // 締切日超過タスク（今日より前の日付・未完了）※クライアント別
  const clientAllTasks = c ? S.tasks.filter(t=>t.client_id===c.id) : S.tasks;
  const pastDueTasks = clientAllTasks.filter(t=>isPastDue(t)).sort((a,b)=>a.date.localeCompare(b.date));

  const allMsg=`${c.name}さんの今日の進捗 (${fmtNow()})\n\n`
    +todayT.map(t=>`${t.done?"[完了]":isOverdue(t)?"[時間切れ]":isStarted(t)?"[進行中]":"[未着手]"} ${t.title}${fmtTimeRange(t)?" "+fmtTimeRange(t):""}`).join("\n")
    +`\n\n完了 ${done}/${total}`;

  const mgrSec=(tasks,label,color)=>{
    if(!tasks.length)return "";
    return `<div class="sec-lbl" style="color:${color}">${label} <span>${tasks.length}件</span></div>`+tasks.map(t=>mgrCard(t,c)).join("");
  };
  const doneSection=doneTasks.length===0?"":S.showDone
    ?mgrSec(doneTasks,"Done","var(--green)")
    :`<button class="tog-btn" id="toggle-done">完了済みを表示 (${doneTasks.length}件)</button>`;
  const togBtn=doneTasks.length>0&&S.showDone
    ?`<button class="tog-btn" id="toggle-done">完了済みを隠す (${doneTasks.length}件)</button>`:"";

  return `<div class="mode-bar mgr">Manager</div>
    <div class="hdr">
      <button class="back-btn" id="back-to-dashboard">← 一覧に戻る</button>
      <div class="hdr-row">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:50%;background:${colorStr}22;color:${colorStr};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0">${c.name.slice(0,1)}</div>
          <div>
            <div style="font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-0.5px">${esc(c.name)}</div>
            <div style="font-size:11px;color:var(--blue);font-family:monospace;margin-top:2px;cursor:pointer" id="detail-url-copy" data-url="${location.origin+location.pathname}?client=${c.token||c.id}">
              ?client=${c.token||c.id}  
            </div>
            <div class="hdr-sub">${done}/${total} 完了  ·  ${pct}%${overdue>0?`  ·  <span style="color:var(--red);font-weight:700">${overdue}件 時間切れ</span>`:""}${started>0?`  ·  <span style="color:var(--yd);font-weight:700">${started}件 進行中</span>`:""}</div>
          </div>
        </div>
        <button class="del-btn" data-client-del="${c.id}" style="font-size:12px;color:#CCC">削除</button>
      </div>
      ${barHTML(pct, pct>=70?"var(--green)":pct>=40?"var(--y)":"var(--red)")}
      ${alert==="red"?`<div style="margin-top:8px;padding:8px 12px;background:#FEF2F2;border-radius:8px;font-size:12px;color:var(--red);font-weight:600"> 3日連続で達成率が低い状態です。声かけを検討してください。</div>`:""}
      ${alert==="yellow"?`<div style="margin-top:8px;padding:8px 12px;background:#FFFBEA;border-radius:8px;font-size:12px;color:var(--yd);font-weight:600">週間の平均達成率が低めです。タスクの見直しを検討してください。</div>`:""}
    </div>
    <div class="scroll">
      ${chart}
      <a href="${lineURL(allMsg)}" target="_blank" class="line-all-btn">今日の進捗をLINEで送る</a>
      ${mgrSec(overdueTasks,"Overdue","var(--red)")}
      ${mgrSec(startedTasks,"進行中","var(--yd)")}
      ${mgrSec(pendingTasks,"Pending","var(--muted)")}
      ${doneSection}${togBtn}
      ${(()=>{
        const pdt=S.tasks.filter(t=>t.client_id===c.id&&isPastDue(t)).sort((a,b)=>a.date.localeCompare(b.date));
        if(!pdt.length)return "";
        const rows=pdt.map(t=>{
          const g=getGoal(t.goal_id),cat=getCat(t.cat);
          const daysOver=Math.floor((new Date(today())-new Date(t.date))/(1000*60*60*24));
          const msg=overdueTemplates(c.name, t.title)+`\n（締切から${daysOver}日経過）`;
          return `<div class="pastdue-row">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:var(--ink)">${esc(t.title)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">${cat.label}${g?"  ·  "+g.title:""}  ·  ${fmtShort(t.date)}</div>
            </div>
            <span class="pastdue-date">${daysOver}日超過</span>
            <a href="${lineURL(msg)}" target="_blank" class="m-btn m-btn-red" style="font-size:11px;padding:5px 10px;margin-left:8px;flex-shrink:0">声かけ</a>
          </div>`;
        }).join("");
        return `<div class="pastdue-section" style="margin-top:16px">
          <div class="pastdue-header" id="mgr-pastdue-toggle">
            <div class="pastdue-title">やり残し（締切超過）<span class="pastdue-count">${pdt.length}</span></div>
            <div class="pastdue-arrow${S.showPastDue?" open":""}">▼</div>
          </div>
          ${S.showPastDue?`<div class="pastdue-body">${rows}</div>`:""}
        </div>`;
      })()}
    </div>
    <button id="mgr-reload" style="position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:99px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:10">更新</button>`;
}

function mgrCard(t, client){
  const od=isOverdue(t),st=isStarted(t);
  const cat=getCat(t.cat),g=getGoal(t.goal_id);
  const sk=t.done?"done":od?"overdue":st?"started":"pending";
  const sl={done:"Done",overdue:"Overdue",started:"進行中",pending:"Pending"}[sk];
  const timeStr=fmtTimeRange(t);
  const meta=[cat.label,g?g.title:"",timeStr,t.isRepeat?repeatLabel(t.repeatStr):""].filter(Boolean).join("  ·  ");
  const name=client?client.name+"さん":"";
  const overdueMsg=overdueTemplates(client?client.name:"", t.title);
  const startedMsg=`${name}、${t.title}の開始時刻${t.start_time?"("+t.start_time+")":""}になりました。今から始められそうですか？`;
  const checkMsg=`${name}、${t.title}は今どんな状況ですか？今日中に終わる見込みはありますか？`;
  const cheerMsg=`${name}、${t.title}完了しましたね。お疲れ様でした！`;
  const clientName = client ? client.name : "";
  const lineUid = client ? (client.line_user_id || null) : null;

  // 送信ボタン生成（公式LINE or シェアURL）
  function lineBtn(msg, label, cls, isOverdueBtn=false) {
    if (lineUid) {
      // 公式LINEから直接送信
      if (isOverdueBtn) {
        return `<button class="m-btn ${cls} overdue-send-btn" data-name="${esc(clientName)}" data-title="${esc(t.title)}" data-lineuid="${lineUid}">${label}</button>`;
      }
      return `<button class="m-btn ${cls} direct-line-btn" data-msg="${esc(msg)}" data-lineuid="${lineUid}">${label}</button>`;
    } else {
      // 従来のシェアURL
      if (isOverdueBtn) {
        return `<button class="m-btn ${cls} overdue-send-btn" data-name="${esc(clientName)}" data-title="${esc(t.title)}">${label}</button>`;
      }
      return `<a href="${lineURL(msg)}" target="_blank" class="m-btn ${cls}">${label}</a>`;
    }
  }

  const actions=t.done
    ?`<div class="m-actions">${lineBtn(cheerMsg,"お疲れ様と伝える","m-btn-gray")}</div>`
    :od?`<div class="m-actions">${lineBtn("","時間切れを伝える","m-btn-red",true)}${lineBtn(checkMsg,"状況を確認する","m-btn-dark")}</div>`
    :st?`<div class="m-actions">${lineBtn(startedMsg,"開始を声かけ","m-btn-y")}${lineBtn(checkMsg,"状況を確認","m-btn-dark")}</div>`
    :`<div class="m-actions">${lineBtn(checkMsg,"状況を確認する","m-btn-dark")}</div>`;
  return `<div class="m-card${od?" overdue":st?" started":t.done?" done-card":""}">
    <div class="m-card-inner">
      <div class="m-card-top"><div class="m-dot ${sk}"></div><div class="m-task-title${t.done?" done-txt":""}">${esc(t.title)}${t.isRepeat?`<span class="rep-badge">${repeatLabel(t.repeatStr)}</span>`:""}</div><div class="m-status-tag ${sk}">${sl}</div></div>
      <div class="m-meta">${meta}</div>
    </div>${actions}
  </div>`;
}

// ══ カレンダー（共通）════════════════════════════════════
function calView(tasks,readOnly){
  const days=Array.from({length:14},(_,i)=>addDays(i-2));
  const strip=days.map(d=>{
    const dt=localDate(d),isSel=d===S.calSel,isToday=d===today();
    const has=tasks.some(t=>t.date===d),hasDone=tasks.some(t=>t.date===d&&t.done);
    const dotBg=isSel?"var(--yd)":hasDone?"var(--green)":has?"#DDD":"transparent";
    return `<div class="cal-day${isSel?" sel":""}${isToday&&!isSel?" tod":""}" data-calday="${d}">
      <div class="cal-wd">${WD[dt.getDay()]}</div><div class="cal-num">${dt.getDate()}</div>
      <div class="cal-dot" style="background:${dotBg}"></div>
    </div>`;
  }).join("");
  const selTasks=[...tasks.filter(t=>t.date===S.calSel)].sort((a,b)=>{const ta=a.start_time||a.time||"99:99",tb=b.start_time||b.time||"99:99";return ta.localeCompare(tb);});
  const selDt=localDate(S.calSel);
  const label=S.calSel===today()?`Today  ·  ${selTasks.length}件`:`${fmtShort(S.calSel)} (${WD[selDt.getDay()]})  ·  ${selTasks.length}件`;
  const rows=selTasks.length===0?`<div class="empty">この日のタスクなし</div>`:
    selTasks.map(t=>{const cat=getCat(t.cat),g=getGoal(t.goal_id),od=isOverdue(t),ts=fmtTimeRange(t);
      return `<div class="time-row"><div class="time-lbl"${od?` style="color:var(--red)"`:""}>${ts||"—"}</div><div class="time-sep"></div>
        <div style="flex:1;min-width:0;opacity:${t.done?.4:1}">
          <div style="font-size:14px;font-weight:500;${t.done?"text-decoration:line-through;":""}${od&&!t.done?"color:var(--red)":""}">${esc(t.title)}${t.isRepeat?`<span class="rep-badge">${repeatLabel(t.repeatStr)}</span>`:""}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${cat.label}${g?"  ·  "+g.title:""}</div>
        </div>
        ${!readOnly?`<div class="chk${t.done?" checked":""}" data-chk="${t.id}" style="flex-shrink:0">${t.done?checkSVG():""}</div>`:""}
      </div>`;
    }).join("");
  return `<div class="cal-strip">${strip}</div><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:4px 0 0">${label}</div>${rows}`;
}

// ══ 追加フォーム ══════════════════════════════════════════
function renderAddArea(){
  if(!S.adding)return `<div class="add-wrap"><button class="add-btn" id="add-open">+ タスクを追加</button></div>`;
  const gOpts=S.goals.map(g=>`<option value="${g.id}">${esc(g.title)}</option>`).join("");
  const cOpts=CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("");
  return `<div class="add-wrap"><div class="form-wrap">
    <input class="form-input" id="f-title" placeholder="タスクを入力..." autocomplete="off">
    <div class="form-row"><select class="form-sel" id="f-goal">${gOpts||`<option value="">（目標を先に追加）</option>`}</select><select class="form-sel" id="f-cat">${cOpts}</select></div>
    <div class="form-lbl">時間（任意）</div>
    <div class="time-row-form"><select class="form-sel" id="f-start">${timeOptions(S.draft.start_time||null)}</select><span class="time-arrow">→</span><select class="form-sel" id="f-end">${timeOptions(S.draft.time||null)}</select></div>
    <input class="form-sel" type="date" id="f-date" value="${S.draft.date}" style="width:100%">
    <div class="form-btns"><button class="form-ok" id="f-ok">追加する</button><button class="form-cancel" id="f-cancel">キャンセル</button></div>
  </div></div>`;
}

// ══ イベントバインド ══════════════════════════════════════
function bind(){
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{S.tab=el.dataset.tab;S.selClientId=null;render();}));
  document.querySelectorAll("[data-cat]").forEach(el=>el.addEventListener("click",()=>{S.catFilter=el.dataset.cat;render();}));
  document.querySelectorAll("[data-chk]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const raw=el.dataset.chk;
    if(String(raw).startsWith("r"))toggleRepeatDone(+raw.slice(1),today());
    else{const t=S.tasks.find(t=>t.id===+raw);if(t)toggleTask(t.id,!t.done);}
  }));
  document.querySelectorAll("[data-goal]").forEach(el=>el.addEventListener("click",()=>{const id=+el.dataset.goal;S.openGoal=S.openGoal===id?null:id;render();}));
  document.querySelectorAll("[data-goal-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();if(confirm("この目標を削除しますか？"))deleteGoal(+el.dataset.goalDel);}));
  document.querySelectorAll("[data-rep-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();if(confirm("この固定タスクを削除しますか？"))deleteRepeat(+el.dataset.repDel);}));
  document.querySelectorAll("[data-calday]").forEach(el=>el.addEventListener("click",()=>{S.calSel=el.dataset.calday;render();}));

  // クライアントカードをクリック→詳細へ
  document.querySelectorAll("[data-client]").forEach(el=>el.addEventListener("click",()=>{S.selClientId=+el.dataset.client;render();}));
  // クライアント削除
  document.querySelectorAll("[data-client-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();if(confirm("このクライアントを削除しますか？"))deleteClient(+el.dataset.clientDel);}));
  // 一覧に戻る
  // クライアント詳細のURLコピー
  const detailCopy=document.getElementById("detail-url-copy");
  if(detailCopy)detailCopy.addEventListener("click",()=>{
    const url=detailCopy.dataset.url;
    navigator.clipboard.writeText(url).then(()=>{
      detailCopy.textContent="コピーしました！ ";
      setTimeout(()=>{ detailCopy.textContent=`?client=${url.split("=")[1]}  `; },2000);
    }).catch(()=>{
      const el=document.createElement("textarea");
      el.value=url; document.body.appendChild(el);
      el.select(); document.execCommand("copy");
      document.body.removeChild(el);
      detailCopy.textContent="コピーしました！ ";
      setTimeout(()=>{ detailCopy.textContent=`?client=${url.split("=")[1]}  `; },2000);
    });
  });

  const back=document.getElementById("back-to-dashboard");
  if(back)back.addEventListener("click",()=>{S.selClientId=null;render();});

  // 招待URLコピー
  const copyBtn=document.getElementById("invite-copy-btn");
  if(copyBtn)copyBtn.addEventListener("click",()=>{
    const urlText=document.getElementById("invite-url-text")?.textContent;
    if(urlText){
      navigator.clipboard.writeText(urlText).then(()=>{
        copyBtn.textContent="コピーしました！";
        copyBtn.style.background="#059669";
        setTimeout(()=>{copyBtn.textContent="URLをコピー";copyBtn.style.background="#10B981";},2000);
      }).catch(()=>{
        // フォールバック
        const el=document.createElement("textarea");
        el.value=urlText; document.body.appendChild(el);
        el.select(); document.execCommand("copy");
        document.body.removeChild(el);
        copyBtn.textContent="コピーしました！";
        setTimeout(()=>{copyBtn.textContent="URLをコピー";},2000);
      });
    }
  });
  const closeInvite=document.getElementById("invite-close-btn");
  if(closeInvite)closeInvite.addEventListener("click",()=>{S.newClientId=null;render();});

  // クライアント追加
  const clAddOpen=document.getElementById("cl-add-open");
  if(clAddOpen)clAddOpen.addEventListener("click",()=>{S.addingClient=true;render();setTimeout(()=>document.getElementById("cl-name")?.focus(),50);});
  const clok=document.getElementById("cl-ok");
  if(clok)clok.addEventListener("click",async()=>{
    const name=document.getElementById("cl-name").value.trim();
    if(!name)return;
    await addClient({name,color:document.getElementById("cl-color").value});
  });
  const clc=document.getElementById("cl-cancel");
  if(clc)clc.addEventListener("click",()=>{S.addingClient=false;render();});

  // タスク追加
  const ao=document.getElementById("add-open");
  if(ao)ao.addEventListener("click",()=>{S.adding=true;render();setTimeout(()=>document.getElementById("f-title")?.focus(),50);});
  const fok=document.getElementById("f-ok");
  if(fok)fok.addEventListener("click",async()=>{
    const title=document.getElementById("f-title").value.trim();
    if(!title)return;
    await addTask({gid:document.getElementById("f-goal").value,cat:document.getElementById("f-cat").value,title,start_time:document.getElementById("f-start").value||"",time:document.getElementById("f-end").value||"",date:document.getElementById("f-date").value||today(),client_id:urlClientId});
    S.adding=false;
  });
  const fc=document.getElementById("f-cancel");
  if(fc)fc.addEventListener("click",()=>{S.adding=false;render();});

  // 固定タスク追加
  const rpOpen=document.getElementById("repeat-add-open");
  if(rpOpen)rpOpen.addEventListener("click",()=>{S.addingRepeat=true;render();setTimeout(()=>document.getElementById("rp-title")?.focus(),50);});
  const rpok=document.getElementById("rp-ok");
  if(rpok)rpok.addEventListener("click",async()=>{
    const title=document.getElementById("rp-title").value.trim();
    if(!title)return;
    await addRepeat({gid:document.getElementById("rp-goal").value,cat:document.getElementById("rp-cat").value,title,start_time:document.getElementById("rp-start").value||"",time:document.getElementById("rp-end").value||"",repeat:document.getElementById("rp-repeat").value});
    S.addingRepeat=false;
  });
  const rpc=document.getElementById("rp-cancel");
  if(rpc)rpc.addEventListener("click",()=>{S.addingRepeat=false;render();});

  // 目標追加
  const gao=document.getElementById("goal-add-open");
  if(gao)gao.addEventListener("click",()=>{S.addingGoal=true;render();setTimeout(()=>document.getElementById("g-title")?.focus(),50);});
  const gok=document.getElementById("g-ok");
  if(gok)gok.addEventListener("click",async()=>{
    const title=document.getElementById("g-title").value.trim();
    if(!title)return;
    await addGoal({title,cat:document.getElementById("g-cat").value,deadline:document.getElementById("g-deadline").value||"",progress:0});
    S.addingGoal=false;
  });
  const gc=document.getElementById("g-cancel");
  if(gc)gc.addEventListener("click",()=>{S.addingGoal=false;render();});


  const gp=document.getElementById("g-progress");
  if(gp)gp.addEventListener("input",()=>{document.getElementById("g-prog-lbl").textContent=gp.value+"%";});

  // アバター・モードバー更新
  const av=document.getElementById("user-av");
  if(av&&urlClientId!==null){
    const cl=S.clients.find(c=>c.id===urlClientId);
    if(cl){
      av.textContent=cl.name.slice(0,1);
      av.style.background=cl.color||"var(--y)";
      av.style.color="#fff";
      const mb=document.getElementById("mode-bar-user");
      if(mb)mb.textContent=cl.name+"さんの画面";
    }

  // 公式LINE直接送信ボタン
  document.querySelectorAll(".direct-line-btn").forEach(el=>{
    el.addEventListener("click",async()=>{
      const msg = el.dataset.msg || "";
      const lineUid = el.dataset.lineuid;
      if (lineUid && msg) {
        el.textContent = "送信中...";
        el.disabled = true;
        await sendLineMessage(lineUid, msg);
        el.textContent = "送信済み ✓";
        setTimeout(()=>{ el.textContent = el.dataset.label||"送信"; el.disabled=false; }, 3000);
      }
    });
  });

  // 完了タスク表示トグル（ユーザー）
  const utd = document.getElementById("user-toggle-done");
  if(utd) utd.addEventListener("click", () => { S.showUserDone = !S.showUserDone; render(); });

  // 時間切れボタン：押すたびにランダムテンプレ
  document.querySelectorAll(".overdue-send-btn").forEach(el=>{
    el.addEventListener("click",async()=>{
      const msg=overdueTemplates(el.dataset.name||"", el.dataset.title||"");
      const lineUid = el.dataset.lineuid;
      if (lineUid) {
        el.textContent = "送信中...";
        el.disabled = true;
        await sendLineMessage(lineUid, msg);
        el.textContent = "送信済み ✓";
        setTimeout(()=>{ el.textContent = "時間切れを伝える"; el.disabled=false; }, 3000);
      } else {
        window.open(lineURL(msg),"_blank");
      }
    });
  });

  // やり残しトグル
  const pt=document.getElementById("pastdue-toggle");
  if(pt)pt.addEventListener("click",()=>{S.showPastDue=!S.showPastDue;render();});

  // KPIインライン入力（今日タブのダッシュカード）


  // タスク編集ボタン
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    S.editingTaskId=+el.dataset.edit;
    render();
  }));
  // タスク削除ボタン
  document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    if(confirm("このタスクを削除しますか？"))deleteTaskDB(+el.dataset.del);
  }));
  // 編集保存
  const eok=document.getElementById("e-ok");
  if(eok)eok.addEventListener("click",async()=>{
    const title=document.getElementById("e-title").value.trim();
    if(!title)return;
    await updateTask(S.editingTaskId,{
      title,
      goal_id:document.getElementById("e-goal").value?+document.getElementById("e-goal").value:null,
      cat:document.getElementById("e-cat").value,
      start_time:document.getElementById("e-start").value||null,
      time:document.getElementById("e-end").value||null,
      date:document.getElementById("e-date").value||today(),
    });
    S.editingTaskId=null;
  });
  // 編集キャンセル
  const eclose=document.getElementById("e-close");
  if(eclose)eclose.addEventListener("click",()=>{S.editingTaskId=null;render();});

  const td=document.getElementById("toggle-done");
  if(td)td.addEventListener("click",()=>{S.showDone=!S.showDone;render();});
  const mpt=document.getElementById("mgr-pastdue-toggle");
  if(mpt)mpt.addEventListener("click",()=>{S.showPastDue=!S.showPastDue;render();});
  const mr=document.getElementById("mgr-reload");
  if(mr)mr.addEventListener("click",()=>loadAll());
}

loadAll();
if(isManager)setInterval(loadAll,30000);
</script>
</body>
</html>
