async function sb(method, table, body, query="") {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`, {
      method, headers:{...H,
        ...(method==="GET"?{"Accept":"application/json"}:{}),
        ...(method==="POST"?{"Prefer":"return=representation"}:{}),
        ...(method==="PATCH"?{"Prefer":"return=representation"}:{})},
      body: body?JSON.stringify(body):undefined,
    });
    const data = res.status===204?null:await res.json();
    return data;
  } catch(e) { console.error(e); throw e; }
}

async function sendLineMessage(lineUserId, message) {
  try {
    const res = await fetch(`${SB_URL}/functions/v1/send-line-message`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SB_KEY },
      body: JSON.stringify({ to: lineUserId, messages: [{ type: "text", text: message }] })
    });
    return await res.json();
  } catch(e) {
    console.error("LINE送信エラー:", e);
    throw e;
  }
}

// ===== ユーティリティ =====
async function loadClientsFromSupabase() {
  try {
    const clientsData = await sb("GET", "clients", "", "?order=id");
    const todayStr = new Date().toISOString().split('T')[0];
    const tasksData = await sb("GET", "tasks", "", `?date=eq.${todayStr}`);
    
    if (!clientsData) return [];
    
    return clientsData.map(c => {
      const clientTasks = tasksData ? tasksData.filter(t => t.client_id === c.id) : [];
      const todayTask = clientTasks.length > 0 ? clientTasks[0] : null;
      
      let status = 'not_started';
      if (todayTask) {
        if (todayTask.done) status = 'completed';
        else if (todayTask.started) status = 'in_progress';
        else {
          // Check if overtime
          if (todayTask.start_time) {
            const [h, m] = todayTask.start_time.split(':').map(Number);
            const now = new Date();
            const t = new Date();
            t.setHours(h, m, 0, 0);
            if (now > t) status = 'overtime';
          }
        }
      }
      
      return {
        id: c.id,
        name: c.name,
        lineDisplayName: c.name, // Fallback
        line_user_id: c.line_user_id,
        type: 'variable', // Default
        targetExam: '設定なし',
        targetDate: '',
        agreement: {
          studyTime: '未設定',
          dailyTask: '未設定',
          duration: '未設定',
          rules: '未設定',
        },
        today: {
          task: todayTask ? todayTask.title : 'タスクなし',
          startTime: todayTask ? todayTask.start_time : '',
          endTime: todayTask ? todayTask.time : '',
          status: status,
          startedAt: todayTask && todayTask.started ? todayTask.start_time : null,
          completedAt: todayTask && todayTask.done ? todayTask.time : null,
          events: [],
        },
      };
    });
  } catch (e) {
    console.error("Supabase読み込みエラー:", e);
    return [];
  }
}

function formatDate(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const days = ['日','月','火','水','木','金','土'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} (${days[d.getDay()]})`;
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function minutesSince(timeStr) {
  if (!timeStr) return 0;
  const [h, m] = timeStr.split(':').map(Number);
  const now = new Date();
  const t = new Date();
  t.setHours(h, m, 0, 0);
  return Math.floor((now - t) / 60000);
}

async function openLineWithMessage(message, client) {
  if (client && client.line_user_id) {
    // Supabase経由で直接送信

      await sendLineMessage(client.line_user_id, message);
      return true; // 送信成功
    } catch (e) {
      console.error(e);
      // 失敗時はフォールバック
    }
  }
  // フォールバック：URLスキーム
  const url = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
  window.open(url, '_blank');
  return false;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function renderTemplate(template, client) {
  const time = client.today.startTime || '';
  const hour = time ? time.split(':')[0] : '';
  return template.replace(/〇〇/g, client.name).replace(/〇時/g, hour + '時');
}

function getPushTemplate(client) {
  const elapsed = minutesSince(client.today.startTime);
  let cat = 'push_first';
  if (elapsed >= 30) cat = 'push_final';
  else if (elapsed >= 20) cat = 'push_second';
  else if (elapsed >= 10) cat = 'push_first';
  return { category: cat, message: renderTemplate(pickRandom(COACH_TEMPLATES[cat]), client) };
}

// ===== 通知画面（コーチのインボックス） =====
function Inbox({ clients, onReply, onOpenAgreement, markAllRead }) {
  const events = useMemo(() => {
    const list = [];
    clients.forEach(c => {
      c.today.events.forEach(e => list.push({ ...e, client: c }));
    });
    list.sort((a, b) => new Date(b.time) - new Date(a.time));
    return list;
  }, [clients]);

  const newEvents = events.filter(e => e.isNew);

  const getEventMeta = (type) => {
    switch (type) {
      case 'user_started': return { icon: '🔥', label: '開始', color: 'bg-blue-50 border-blue-200', suggest: 'praise_start' };
      case 'user_completed': return { icon: '🏁', label: '完了', color: 'bg-green-50 border-green-200', suggest: 'praise_complete' };
      case 'user_sos': return { icon: '🆘', label: 'SOS', color: 'bg-purple-50 border-purple-200', suggest: 'sos_reply' };
      case 'overtime_detected': return { icon: '⏰', label: '時間切れ', color: 'bg-red-50 border-red-200', suggest: 'push_first' };
      default: return { icon: '📬', label: 'イベント', color: 'bg-gray-50 border-gray-200', suggest: 'praise_start' };
    }
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">🔔 通知</h1>
          <p className="text-sm text-gray-500 mt-0.5">{newEvents.length}件の未対応</p>
        </div>
        {newEvents.length > 0 && (
          <button onClick={markAllRead} className="text-xs text-gray-500 hover:text-gray-700">すべて既読</button>
        )}
      </div>

      {events.length === 0 ? (
        <div className="bg-white rounded-2xl border border-gray-100 p-12 text-center">
          <div className="text-4xl mb-2">📭</div>
          <p className="text-sm text-gray-500">まだ通知がありません</p>
          <p className="text-xs text-gray-400 mt-1">「ユーザー操作」からテストできます</p>
        </div>
      ) : (
        <div className="space-y-3">
          {events.map((e, i) => {
            const meta = getEventMeta(e.type);
            return (
              <div key={i} className={`${meta.color} border rounded-2xl p-4 ${e.isNew ? 'badge-new' : ''}`}>
                <div className="flex items-start justify-between gap-3">
                  <div className="flex items-start gap-3 flex-1 min-w-0">
                    <div className="text-2xl flex-shrink-0">{meta.icon}</div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-semibold text-gray-900">{e.client.name}さん</span>
                        <span className="text-xs bg-white text-gray-600 font-medium px-2 py-0.5 rounded-md">{meta.label}</span>
                        {e.isNew && <span className="text-xs bg-red-500 text-white font-bold px-2 py-0.5 rounded-md pulse">NEW</span>}
                      </div>
                      <p className="text-sm text-gray-700 mt-1">{e.message}</p>
                      <p className="text-xs text-gray-500 mt-1">{formatTime(e.time)}・タスク：{e.client.today.task}</p>
                    </div>
                  </div>
                </div>
                <div className="mt-3 pt-3 border-t border-gray-200 flex items-center gap-2 flex-wrap">
                  <button onClick={() => onReply(e.client, meta.suggest)} className="bg-[#FFB800] hover:bg-[#E6A600] text-white text-xs font-semibold px-4 py-2 rounded-lg">
                    💬 ワンタップ返信

                    📝 絶対契約を見る

  );
}

      <div>
        <div className="text-xs text-gray-500 font-semibold tracking-wide">{formatDate(today)}</div>
        <h1 className="text-2xl font-bold text-gray-900 mt-1">今日の状況</h1>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="bg-white rounded-2xl p-4 border border-gray-100">
          <div className="text-xs text-gray-600 font-medium">担当者数</div>
          <div className="text-2xl font-bold text-gray-900 mt-1">{total}</div>
        </div>
        <div className="bg-red-50 rounded-2xl p-4 border border-red-100">
          <div className="text-xs text-gray-600 font-medium">時間切れ</div>
          <div className="text-2xl font-bold text-red-600 mt-1">{overtime}</div>
        </div>
        <div className="bg-blue-50 rounded-2xl p-4 border border-blue-100">
          <div className="text-xs text-gray-600 font-medium">進行中</div>
          <div className="text-2xl font-bold text-blue-600 mt-1">{inProgress}</div>
        </div>
        <div className="bg-green-50 rounded-2xl p-4 border border-green-100">
          <div className="text-xs text-gray-600 font-medium">完了 / 達成率</div>
          <div className="text-2xl font-bold text-green-600 mt-1">{completed} <span className="text-sm text-gray-500 font-medium">/ {rate}%</span></div>
        </div>
      </div>

      <div className="space-y-3">
        {clients.map(c => (
          <ClientRow key={c.id} client={c} onReply={onReply} onOpenAgreement={onOpenAgreement} />
        ))}
      </div>
    </div>
  );
}

function ClientRow({ client, onReply, onOpenAgreement }) {
  const t = client.today;
  const statusConfig = {
    not_started: { label: '未着手', cls: 'bg-gray-100 text-gray-700' },
    in_progress: { label: '進行中', cls: 'bg-blue-100 text-blue-700' },
    overtime: { label: '時間切れ', cls: 'bg-red-100 text-red-700' },
    completed: { label: '完了', cls: 'bg-green-100 text-green-700' },
  }[t.status] || { label: '未設定', cls: 'bg-gray-100 text-gray-700' };

  const typeLabel = client.type === 'fixed' ? '固定制' : '変動制';

  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-4">
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-gray-900">{client.name}さん</span>
            <span className="text-xs bg-[#FFF3C4] text-[#8B6914] font-medium px-2 py-0.5 rounded-md">{typeLabel}</span>
            <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${statusConfig.cls}`}>{statusConfig.label}</span>
          </div>
          <div className="text-sm text-gray-700 mt-1.5">{t.task}</div>
          <div className="text-xs text-gray-500 mt-1">{t.startTime}→{t.endTime}{t.startedAt && `・開始 ${t.startedAt}`}{t.completedAt && `・完了 ${t.completedAt}`}</div>
        </div>
      </div>
      <div className="mt-3 pt-3 border-t border-gray-100 flex items-center gap-2 flex-wrap">
        <button onClick={() => {
          const suggest = t.status === 'completed' ? 'praise_complete' :
                          t.status === 'in_progress' ? 'praise_start' :
                          t.status === 'overtime' ? getPushTemplate(client).category :
                          'pre_reminder';
          onReply(client, suggest);
        }} className="bg-[#FFB800] hover:bg-[#E6A600] text-white text-xs font-semibold px-4 py-2 rounded-lg">
          💬 返信
        </button>
        <button onClick={() => onOpenAgreement(client)} className="bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg hover:bg-gray-50">
          📝 絶対契約
        </button>
      </div>
    </div>
  );
}

// ===== クライアント一覧 =====
function ClientsPage({ clients, onAdd, onDelete, onOpenAgreement }) {
  const [showForm, setShowForm] = useState(false);

  return (
    <div className="space-y-5">
      <h1 className="text-2xl font-bold text-gray-900">👥 クライアント</h1>

      <div className="space-y-3">
        {clients.map(c => (
          <div key={c.id} className="bg-white rounded-2xl border border-gray-100 p-4">
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold text-gray-900">{c.name}さん</span>
                  <span className="text-xs bg-[#FFF3C4] text-[#8B6914] font-medium px-2 py-0.5 rounded-md">{c.type === 'fixed' ? '固定制' : '変動制'}</span>
                </div>
                <div className="text-sm text-gray-700 mt-1">🎯 {c.targetExam}（{c.targetDate}）</div>
                <div className="text-xs text-gray-500 mt-1">⏰ {c.agreement.studyTime}</div>
              </div>
            </div>
            <div className="mt-3 pt-3 border-t border-gray-100 flex items-center gap-2 flex-wrap">
              <button onClick={() => onOpenAgreement(c)} className="bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg hover:bg-gray-50">
                📝 契約詳細
              </button>
              <button onClick={() => { if (window.confirm(`${c.name}さんを削除しますか？`)) onDelete(c.id); }} className="bg-white border border-red-200 text-red-600 text-xs font-semibold px-4 py-2 rounded-lg hover:bg-red-50">
                🗑 削除
              </button>
            </div>
          </div>
        ))}
      </div>

      {showForm ? (
        <AddClientForm onAdd={(c) => { onAdd(c); setShowForm(false); }} onCancel={() => setShowForm(false)} />
      ) : (
        <button onClick={() => setShowForm(true)} className="w-full border-2 border-dashed border-gray-300 rounded-2xl py-4 text-sm font-semibold text-gray-600 hover:border-[#FFB800] hover:text-[#8B6914] transition">
          + クライアントを追加
        </button>
      )}
    </div>
  );
}

function AddClientForm({ onAdd, onCancel }) {
  const [form, setForm] = useState({
    name: '', lineDisplayName: '', type: 'fixed',
    targetExam: '', targetDate: '',
    studyTime: '', dailyTask: '', duration: '', rules: '時間厳守。1分でも遅れたら追撃あり。',
    task: '', startTime: '21:00', endTime: '22:00',
  });

  const handleSubmit = () => {
    if (!form.name || !form.targetExam) { alert('名前と目標は必須です'); return; }
    onAdd({
      id: `c${Date.now()}`,
      name: form.name,
      lineDisplayName: form.lineDisplayName || form.name,
      type: form.type,
      targetExam: form.targetExam,
      targetDate: form.targetDate,
      agreement: { studyTime: form.studyTime, dailyTask: form.dailyTask, duration: form.duration, rules: form.rules },
      today: {
        task: form.task || '（未設定）',
        startTime: form.startTime,
        endTime: form.endTime,
        status: 'not_started',
        startedAt: null, completedAt: null, events: [],
      },
    });
  };

  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-5 space-y-3">
      <h3 className="font-semibold text-gray-900">クライアント追加</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <Field label="名前（苗字）" value={form.name} onChange={v => setForm({...form, name: v})} placeholder="田中" />
        <Field label="LINE表示名" value={form.lineDisplayName} onChange={v => setForm({...form, lineDisplayName: v})} placeholder="田中太郎" />
        <div>
          <label className="block text-xs text-gray-600 mb-1">タイプ</label>
          <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm">
            <option value="fixed">固定制（毎日同じ時間）</option>
            <option value="variable">変動制（毎日時間が変わる）</option>
          </select>
        </div>
        <Field label="目標試験" value={form.targetExam} onChange={v => setForm({...form, targetExam: v})} placeholder="簿記3級" />
        <Field label="受験日" value={form.targetDate} onChange={v => setForm({...form, targetDate: v})} placeholder="2026-06-15" type="date" />
        <Field label="プログラム期間" value={form.duration} onChange={v => setForm({...form, duration: v})} placeholder="3ヶ月" />
        <Field label="学習時間（契約）" value={form.studyTime} onChange={v => setForm({...form, studyTime: v})} placeholder="毎日21:00〜22:00" />
        <Field label="日々のタスク（契約）" value={form.dailyTask} onChange={v => setForm({...form, dailyTask: v})} placeholder="1日1時間・テキスト2ページ" />
        <Field label="今日のタスク" value={form.task} onChange={v => setForm({...form, task: v})} placeholder="テキスト p.1-15" />
        <div className="grid grid-cols-2 gap-2">
          <Field label="開始時刻" value={form.startTime} onChange={v => setForm({...form, startTime: v})} type="time" />
          <Field label="終了時刻" value={form.endTime} onChange={v => setForm({...form, endTime: v})} type="time" />
        </div>
      </div>
      <div className="flex gap-2 pt-2">
        <button onClick={handleSubmit} className="bg-[#FFB800] hover:bg-[#E6A600] text-white text-sm font-semibold px-5 py-2 rounded-xl">追加</button>
        <button onClick={onCancel} className="bg-white border border-gray-200 text-gray-600 text-sm font-semibold px-5 py-2 rounded-xl">キャンセル</button>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, type = 'text' }) {
  return (
    <div>
      <label className="block text-xs text-gray-600 mb-1">{label}</label>
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm" />
    </div>
  );
}

// ===== ユーザー操作シミュレーター =====
// ===== メインアプリ =====
function App() {
  const [page, setPage] = useState('inbox');
  
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(true);
  
  useEffect(() => {
    loadClientsFromSupabase().then(data => {
      setClients(data);
      setLoading(false);
    });
  }, []);

  const [toast, setToast] = useState(null);
  const [agreementClient, setAgreementClient] = useState(null);
  const [replyTarget, setReplyTarget] = useState(null);

  useEffect(() => { saveClients(clients); }, [clients]);

  const newCount = useMemo(() => clients.reduce((s, c) => s + c.today.events.filter(e => e.isNew).length, 0), [clients]);

  const addEvent = (clientId, event) => {
    setClients(prev => prev.map(c => {
      if (c.id !== clientId) return c;
      return {
        ...c,
        today: { ...c.today, events: [...c.today.events, { ...event, isNew: true, time: new Date().toISOString() }] },
      };
    }));
  };

  const handleUserAction = (clientId, type) => {
    setClients(prev => prev.map(c => {
      if (c.id !== clientId) return c;
      const now = new Date();
      const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      let updated = { ...c.today };
      let event = { type, isNew: true, time: now.toISOString() };
      if (type === 'user_started') {
        updated.status = 'in_progress';
        updated.startedAt = timeStr;
        event.message = 'ユーザーが「開始しました」を送信';
      } else if (type === 'user_completed') {
        updated.status = 'completed';
        updated.completedAt = timeStr;
        event.message = 'ユーザーが「完了しました」を送信';
      } else if (type === 'user_sos') {
        event.message = 'ユーザーが「SOS」を送信';
      }
      updated.events = [...updated.events, event];
      return { ...c, today: updated };
    }));
    setToast({ message: '新しい通知が届きました', type: 'info' });
  };

  const forceOvertime = (clientId) => {
    setClients(prev => prev.map(c => {
      if (c.id !== clientId) return c;
      return {
        ...c,
        today: {
          ...c.today,
          status: 'overtime',
          events: [...c.today.events, { type: 'overtime_detected', message: '着手時刻を過ぎました', isNew: true, time: new Date().toISOString() }],
        },
      };
    }));
    setToast({ message: '時間切れを検知しました', type: 'info' });
  };

  const handleReply = (client, defaultCategory) => {
    setReplyTarget({ client, defaultCategory });
  };

  const handleSend = (message) => {
    if (!replyTarget) return;
    const { client } = replyTarget;
    openLineWithMessage(message);
    setClients(prev => prev.map(c => {
      if (c.id !== client.id) return c;
      return {
        ...c,
        today: {
          ...c.today,
          events: c.today.events.map(e => ({ ...e, isNew: false })),
        },
      };
    }));
    setReplyTarget(null);
    setToast({ message: `${client.name}さんのLINEを開きました`, type: 'success' });
  };

  const markAllRead = () => {
    setClients(prev => prev.map(c => ({
      ...c,
      today: { ...c.today, events: c.today.events.map(e => ({ ...e, isNew: false })) },
    })));
  };

  const handleAdd = (client) => {
    setClients(prev => [...prev, client]);
    setToast({ message: 'クライアントを追加しました', type: 'success' });
  };

  const handleDelete = (id) => {
    setClients(prev => prev.filter(c => c.id !== id));
    setToast({ message: 'クライアントを削除しました', type: 'success' });
  };

  return (
    <div className="min-h-screen flex bg-[#FFF9E6]">
      <Sidebar page={page} setPage={setPage} newCount={newCount} />
      <main className="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-5xl mx-auto w-full">
        {page === 'inbox' && <Inbox clients={clients} onReply={handleReply} onOpenAgreement={setAgreementClient} markAllRead={markAllRead} />}
        {page === 'dashboard' && <Dashboard clients={clients} onReply={handleReply} onOpenAgreement={setAgreementClient} />}
        {page === 'clients' && <ClientsPage clients={clients} onAdd={handleAdd} onDelete={handleDelete} onOpenAgreement={setAgreementClient} />}
        {page === 'simulator' && <Simulator clients={clients} onUserAction={handleUserAction} onForceOvertime={forceOvertime} />}
      </main>

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
      {agreementClient && <AgreementModal client={agreementClient} onClose={() => setAgreementClient(null)} />}
      {replyTarget && <ReplyModal client={replyTarget.client} defaultCategory={replyTarget.defaultCategory} onSend={handleSend} onClose={() => setReplyTarget(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
