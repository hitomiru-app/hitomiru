async function fetchClients() {
  const { data, error } = await supabase
    .from('clients')
    .select('*')
    .order('created_at', { ascending: true });
  if (error) throw error;
  return data;
}

async function fetchTodayLogs(date) {
  const { data, error } = await supabase
    .from('daily_logs')
    .select('*')
    .eq('date', date);
  if (error) throw error;
  return data;
}

async function fetchTodayEvents(date) {
  const { data, error } = await supabase
    .from('events')
    .select('*')
    .eq('date', date)
    .order('created_at', { ascending: true });
  if (error) throw error;
  return data;
}

async function upsertDailyLog(log) {
  const { data, error } = await supabase
    .from('daily_logs')
    .upsert(log, { onConflict: 'client_id,date' })
    .select()
    .single();

}

function mergeClientData(clients, logs, events) {
  const today = getTodayStr();
  return clients.map(c => {
    const log = logs.find(l => l.client_id === c.id) || {
      client_id: c.id,
      date: today,
      task: '（未設定）',
      start_time: '21:00',
      end_time: '22:00',
      status: 'not_started',
      started_at: null,
      completed_at: null,
    };
    const clientEvents = events.filter(e => e.client_id === c.id);
    return {
      id: c.id,
      name: c.name,
      lineDisplayName: c.line_display_name,
      type: c.type,

    };

}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ===== ユーティリティ =====
function formatDate(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const days = ['日','月','火','水','木','金','土'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} (${days[d.getDay()]})`;
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function minutesSince(timeStr) {
  if (!timeStr) return 0;
  const [h, m] = timeStr.split(':').map(Number);
  const now = new Date();
  const t = new Date();
  t.setHours(h, m, 0, 0);
  return Math.floor((now - t) / 60000);
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function renderTemplate(template, client) {
  const time = client.today.startTime;
  return template.replace(/〇〇/g, client.name).replace(/〇時/g, `${time.split(':')[0]}時`);
}

function getPushTemplate(client) {
  const elapsed = minutesSince(client.today.startTime);
  let cat = 'push_first';
  if (elapsed >= 30) cat = 'push_final';
  else if (elapsed >= 20) cat = 'push_second';
  else if (elapsed >= 10) cat = 'push_first';
  return { category: cat, message: renderTemplate(pickRandom(COACH_TEMPLATES[cat]), client) };
}

// ===== 通知Inbox =====
function Inbox({ clients, onReply, onOpenAgreement, onMarkAllRead }) {
  const allEvents = clients.flatMap(c => c.today.events.map(e => ({ ...e, client: c })));
  const newEvents = allEvents.filter(e => e.isNew).sort((a,b) => new Date(b.time) - new Date(a.time));
  const oldEvents = allEvents.filter(e => !e.isNew).sort((a,b) => new Date(b.time) - new Date(a.time));

  const eventMeta = (type) => {
    const map = {
      user_started: { icon: '🔥', label: '開始しました', color: 'bg-blue-50 border-blue-100', suggest: 'praise_start' },
      user_completed: { icon: '🏁', label: '完了しました', color: 'bg-green-50 border-green-100', suggest: 'praise_complete' },
      user_sos: { icon: '🆘', label: 'SOSを送信', color: 'bg-purple-50 border-purple-100', suggest: 'sos_reply' },
      overtime_detected: { icon: '⏰', label: '時間切れ', color: 'bg-red-50 border-red-100', suggest: 'push_first' },
    };
    return map[type] || { icon: '📌', label: type, color: 'bg-gray-50 border-gray-100', suggest: 'pre_reminder' };
  };

  const renderEvent = (e, isNew) => {
    const meta = eventMeta(e.type);
    return (
      <div key={e.id} className={`border rounded-2xl p-4 ${meta.color} ${isNew ? 'badge-new' : ''}`}>
        <div className="flex items-start justify-between gap-3">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-base">{meta.icon}</span>
              <span className="font-semibold text-gray-900 text-sm">{e.client.name}さん</span>
              <span className="text-xs text-gray-500">{meta.label}</span>
              {isNew && <span className="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full badge-new">NEW</span>}
            </div>
            <p className="text-xs text-gray-600 mt-1">{e.message}</p>
            <p className="text-xs text-gray-400 mt-1">{formatTime(e.time)}</p>
          </div>
        </div>
        <div className="mt-3 flex gap-2 flex-wrap">
          <button onClick={() => onReply(e.client, meta.suggest)} className="bg-[#FFB800] hover:bg-[#E6A600] text-white text-xs font-semibold px-4 py-2 rounded-lg">
            💬 ワンタップ返信
          </button>
          <button onClick={() => onOpenAgreement(e.client)} className="bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg hover:bg-gray-50">
            📝 絶対契約を見る
          </button>
        </div>
      </div>
    );
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">🔔 通知</h1>
          <p className="text-sm text-gray-500 mt-1">未読 {newEvents.length}件</p>
        </div>
        {newEvents.length > 0 && (
          <button onClick={onMarkAllRead} className="text-xs text-[#8B6914] hover:text-[#FFB800] font-semibold">すべて既読</button>
        )}
      </div>
      {newEvents.length === 0 && oldEvents.length === 0 && (
        <div className="text-center py-12 text-gray-400">
          <div className="text-4xl mb-2">🎉</div>
          <p className="text-sm">新しい通知はありません</p>
        </div>
      )}
      {newEvents.length > 0 && (
        <div className="space-y-3">
          <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide">未読</div>
          {newEvents.map(e => renderEvent(e, true))}
        </div>
      )}
      {oldEvents.length > 0 && (
        <div className="space-y-3">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide">既読</div>
          {oldEvents.map(e => renderEvent(e, false))}
        </div>
      )}
    </div>
  );
}

// ===== メインアプリ =====
function App() {
  const [page, setPage] = useState('inbox');
  const [clients, setClients] = useState([]);
  const [toast, setToast] = useState(null);
  const [agreementClient, setAgreementClient] = useState(null);
  const [replyTarget, setReplyTarget] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const showToast = (message, type = 'success') => setToast({ message, type });

  // ===== データロード =====
  const loadData = useCallback(async () => {
    setError(null);
    try {
      const today = getTodayStr();
      const [rawClients, logs, events] = await Promise.all([
        fetchClients(),
        fetchTodayLogs(today),
        fetchTodayEvents(today),
      ]);
      setClients(mergeClientData(rawClients, logs, events));
    } catch (e) {
      console.error(e);
      setError(e.message || 'データの取得に失敗しました');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  // ===== リアルタイム購読 =====
  useEffect(() => {
    const today = getTodayStr();
    const channel = supabase
      .channel('realtime-hitomiru')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'events', filter: `date=eq.${today}` }, () => {
        loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'daily_logs', filter: `date=eq.${today}` }, () => {
        loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'clients' }, () => {
        loadData();
      })
      .subscribe();

    return () => supabase.removeChannel(channel);
  }, [loadData]);

  const newCount = useMemo(() => clients.reduce((s, c) => s + c.today.events.filter(e => e.isNew).length, 0), [clients]);

  // ===== アクション =====
  const handleUserAction = async (clientId, type) => {
    const today = getTodayStr();
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const messages = {
      user_started: 'ユーザーが「開始しました」を送信',
      user_completed: 'ユーザーが「完了しました」を送信',
      user_sos: 'ユーザーが「SOS」を送信',
    };

    try {
      // daily_logを更新
      const client = clients.find(c => c.id === clientId);
      if (!client) return;

      let logUpdate = {
        client_id: clientId,
        date: today,
        task: client.today.task,
        start_time: client.today.startTime,
        end_time: client.today.endTime,
        status: client.today.status,
        started_at: client.today.startedAt,
        completed_at: client.today.completedAt,
        updated_at: new Date().toISOString(),
      };

      if (type === 'user_started') {
        logUpdate.status = 'in_progress';
        logUpdate.started_at = timeStr;
      } else if (type === 'user_completed') {
        logUpdate.status = 'completed';
        logUpdate.completed_at = timeStr;
      }

      await upsertDailyLog(logUpdate);
      await insertEvent({
        client_id: clientId,
        date: today,
        type,
        message: messages[type],
        is_new: true,
      });

      showToast('新しい通知が届きました', 'info');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  const forceOvertime = async (clientId) => {
    const today = getTodayStr();
    const client = clients.find(c => c.id === clientId);
    if (!client) return;
    try {
      await upsertDailyLog({
        client_id: clientId,
        date: today,
        task: client.today.task,
        start_time: client.today.startTime,
        end_time: client.today.endTime,
        status: 'overtime',
        started_at: client.today.startedAt,
        completed_at: client.today.completedAt,
        updated_at: new Date().toISOString(),
      });
      await insertEvent({
        client_id: clientId,
        date: today,
        type: 'overtime_detected',
        message: '着手時刻を過ぎました',
        is_new: true,
      });
      showToast('時間切れを記録しました', 'info');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  const handleReply = (client, defaultCategory) => setReplyTarget({ client, defaultCategory });

  const handleSend = async (message) => {
    if (!replyTarget) return;
    const { client } = replyTarget;
    const today = getTodayStr();
    openLineWithMessage(message);
    try {
      await markEventsRead(client.id, today);
      showToast(`${client.name}さんのLINEを開きました`, 'success');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
    setReplyTarget(null);
  };

  const handleMarkAllRead = async () => {
    const today = getTodayStr();
    try {
      await markAllEventsRead(today);
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  const handleAdd = async (form) => {
    try {
      const newClient = await addClient({
        name: form.name,
        line_display_name: form.lineDisplayName || form.name,
        type: form.type,
        target_exam: form.targetExam,
        target_date: form.targetDate || null,
        agreement_study_time: form.studyTime,
        agreement_daily_task: form.dailyTask,
        agreement_duration: form.duration,
        agreement_rules: form.rules,
      });

      // 今日のログも作成
      if (form.task) {
        await upsertDailyLog({
          client_id: newClient.id,
          date: getTodayStr(),
          task: form.task,
          start_time: form.startTime,
          end_time: form.endTime,
          status: 'not_started',
          started_at: null,
          completed_at: null,
        });
      }

      showToast('クライアントを追加しました', 'success');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  const handleDelete = async (id) => {
    try {
      await deleteClient(id);
      showToast('クライアントを削除しました', 'success');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  const handleEditTask = async (clientId, form) => {
    const today = getTodayStr();
    const client = clients.find(c => c.id === clientId);
    try {
      await upsertDailyLog({
        client_id: clientId,
        date: today,
        task: form.task,
        start_time: form.startTime,
        end_time: form.endTime,
        status: client.today.status,
        started_at: client.today.startedAt,
        completed_at: client.today.completedAt,
        updated_at: new Date().toISOString(),
      });
      showToast('タスクを保存しました', 'success');
      await loadData();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  };

  if (loading) return <Spinner />;
  if (error) return <ErrorBanner error={error} onRetry={loadData} />;

  return (
    <div className="min-h-screen flex bg-[#FFF9E6]">
      <Sidebar page={page} setPage={setPage} newCount={newCount} />
      <main className="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-5xl mx-auto w-full">
        {page === 'inbox' && <Inbox clients={clients} onReply={handleReply} onOpenAgreement={setAgreementClient} onMarkAllRead={handleMarkAllRead} />}
        {page === 'dashboard' && <Dashboard clients={clients} onReply={handleReply} onOpenAgreement={setAgreementClient} />}
        {page === 'clients' && <ClientsPage clients={clients} onAdd={handleAdd} onDelete={handleDelete} onOpenAgreement={setAgreementClient} onEditTask={handleEditTask} />}
        {page === 'simulator' && <Simulator clients={clients} onUserAction={handleUserAction} onForceOvertime={forceOvertime} />}
      </main>

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
      {agreementClient && <AgreementModal client={agreementClient} onClose={() => setAgreementClient(null)} />}
      {replyTarget && <ReplyModal client={replyTarget.client} defaultCategory={replyTarget.defaultCategory} onSend={handleSend} onClose={() => setReplyTarget(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
